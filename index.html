<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Neopangea — Maroc · Europe</title>
  <meta name="description" content="Analyses opérationnelles sur les dynamiques Maroc–Europe." />

  <style>
    :root {
      --blue: #1f3a5f;
      --blue-soft: #2f4f7a;
      --bg: #f6f4ef;
      --text: #18202a;
      --muted: #566170;
      --border: #e4ded4;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    .container {
      max-width: 1080px;
      margin: auto;
      padding: 24px 22px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(31, 58, 95, 0.18);
      padding-bottom: 14px;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--blue);
    }

    .nav {
      font-size: 14px;
      color: var(--blue-soft);
      font-weight: 600;
    }

    .hero {
      max-width: 850px;
      padding: 20px 0 35px;
    }

    .eyebrow {
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 1.4px;
      color: var(--blue-soft);
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 50px;
      line-height: 1.05;
      letter-spacing: -1.8px;
      margin: 0 0 18px;
      color: var(--blue);
    }

    h2 {
      font-size: 28px;
      letter-spacing: -0.5px;
      margin: 0 0 14px;
      color: var(--blue);
    }

    h3 {
      margin: 0 0 8px;
      font-size: 19px;
      color: var(--blue);
    }

    p {
      margin-top: 0;
    }

    .lead {
      font-size: 19px;
      color: #3d4652;
      max-width: 780px;
      margin-bottom: 12px;
    }

    .credibility {
      font-size: 16px;
      color: var(--blue-soft);
      max-width: 760px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .cta {
      display: inline-block;
      background: var(--blue);
      color: white;
      text-decoration: none;
      padding: 11px 18px;
      border-radius: 6px;
      font-weight: 700;
    }

    .cta:hover {
      background: var(--blue-soft);
    }

    section {
      margin: 36px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-top: 3px solid var(--blue);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.035);
    }

    .muted {
      color: var(--muted);
    }

    .highlight {
      background: #fff;
      border-left: 4px solid var(--blue);
      padding: 18px;
      border-radius: 10px;
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    ul {
      padding-left: 20px;
      margin-top: 0;
      margin-bottom: 0;
    }

    li {
      margin-bottom: 6px;
    }

    .contact {
      background: var(--blue);
      color: white;
      padding: 22px;
      border-radius: 14px;
    }

    .contact h2 {
      color: white;
    }

    .contact a {
      color: white;
      font-weight: 700;
    }

    footer {
      margin-top: 42px;
      padding-top: 18px;
      border-top: 1px solid rgba(31, 58, 95, 0.22);
      font-size: 13px;
      color: #666;
    }

    footer p {
      margin-bottom: 10px;
    }

    footer strong {
      color: var(--blue);
    }

    @media (max-width: 800px) {
      .container {
        padding: 20px 18px;
      }

      header {
        margin-bottom: 26px;
      }

      .hero {
